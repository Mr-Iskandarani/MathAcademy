<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grade 8 MCQ - Powers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f9f9f9;
    }
    h1 {
      color: #0074D9;
    }
    .question {
      margin: 20px 0;
      padding: 10px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .options label {
      display: block;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>Grade 8 - Powers MCQ</h1>

  <div class="question">
    <p>Q1. 2^3 = ?</p>
    <div class="options">
      <label><input type="radio" name="q1"> a) 6</label>
      <label><input type="radio" name="q1"> b) 8</label>
      <label><input type="radio" name="q1"> c) 9</label>
      <label><input type="radio" name="q1"> d) 12</label>
    </div>
  </div>

  <div class="question">
    <p>Q2. 5^2 = ?</p>
    <div class="options">
      <label><input type="radio" name="q2"> a) 10</label>
      <label><input type="radio" name="q2"> b) 15</label>
      <label><input type="radio" name="q2"> c) 25</label>
      <label><input type="radio" name="q2"> d) 50</label>
    </div>
  </div>

  <div class="question">
    <p>Q3. 10^0 = ?</p>
    <div class="options">
      <label><input type="radio" name="q3"> a) 0</label>
      <label><input type="radio" name="q3"> b) 1</label>
      <label><input type="radio" name="q3"> c) 10</label>
      <label><input type="radio" name="q3"> d) Undefined</label>
    </div>
  </div>

  <div class="question">
    <p>Q4. 3^4 = ?</p>
    <div class="options">
      <label><input type="radio" name="q4"> a) 12</label>
      <label><input type="radio" name="q4"> b) 27</label>
      <label><input type="radio" name="q4"> c) 81</label>
      <label><input type="radio" name="q4"> d) 64</label>
    </div>
  </div>

  <div class="question">
    <p>Q5. (-2)^3 = ?</p>
    <div class="options">
      <label><input type="radio" name="q5"> a) -6</label>
      <label><input type="radio" name="q5"> b) -8</label>
      <label><input type="radio" name="q5"> c) 8</label>
      <label><input type="radio" name="q5"> d) 4</label>
    </div>
  </div>

  <div class="question">
    <p>Q6. (4^2) × (4^3) = ?</p>
    <div class="options">
      <label><input type="radio" name="q6"> a) 4^5</label>
      <label><input type="radio" name="q6"> b) 4^6</label>
      <label><input type="radio" name="q6"> c) 4^8</label>
      <label><input type="radio" name="q6"> d) 4^10</label>
    </div>
  </div>

  <div class="question">
    <p>Q7. (7^3) ÷ (7^2) = ?</p>
    <div class="options">
      <label><input type="radio" name="q7"> a) 7</label>
      <label><input type="radio" name="q7"> b) 49</label>
      <label><input type="radio" name="q7"> c) 343</label>
      <label><input type="radio" name="q7"> d) 21</label>
    </div>
  </div>

  <div class="question">
    <p>Q8. (2^5)^2 = ?</p>
    <div class="options">
      <label><input type="radio" name="q8"> a) 2^10</label>
      <label><input type="radio" name="q8"> b) 2^7</label>
      <label><input type="radio" name="q8"> c) 2^25</label>
      <label><input type="radio" name="q8"> d) 2^15</label>
    </div>
  </div>

  <div class="question">
    <p>Q9. 9^-1 = ?</p>
    <div class="options">
      <label><input type="radio" name="q9"> a) 9</label>
      <label><input type="radio" name="q9"> b) 1/9</label>
      <label><input type="radio" name="q9"> c) -9</label>
      <label><input type="radio" name="q9"> d) 0</label>
    </div>
  </div>

  <div class="question">
    <p>Q10. (3^2) × (5^2) = ?</p>
    <div class="options">
      <label><input type="radio" name="q10"> a) 15^2</label>
      <label><input type="radio" name="q10"> b) 8^2</label>
      <label><input type="radio" name="q10"> c) 30^2</label>
      <label><input type="radio" name="q10"> d) 25^2</label>
    </div>
  </div>

</body>
</html>
