<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grade 12 Lessons</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; }
    h1 { background-color: #003366; color: white; padding: 20px; }
    .tab {
      margin: 20px;
    }
    .icon-button {
      background-color: #2196F3;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin: 5px;
      border-radius: 5px;
      font-size: 14px;
    }
    .icon-button:hover { background-color: #0b7dda; }
    .content {
      padding: 10px;
      background-color: #f9f9f9;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      text-align: left;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
  </style>
</head>
<body>

<h1>Grade 12 Mathematics</h1>

<!-- ================= Statistics ================= -->
<div class="tab">
  <h2>📘 chap1.Statistics in two variables </h2>
  <button class="icon-button" onclick="showContent('statc')">📄 Course</button>
  <button class="icon-button" onclick="showContent('statp')">📝 Exercises</button>
</div>

<div id="statc" class="content" style="display:none;">
  <h3>Statistics Course</h3>
  <iframe src="stat/statc.pdf"></iframe>
</div>

<div id="statp" class="content" style="display:none;">
  <h3>Statistics Exercises</h3>
  <iframe src="stat/statp.pdf"></iframe>
</div>

<!-- ================= Rational Functions ================= -->
<div class="tab">
  <h2>📘 chap2.Rational Functions</h2>
  <button class="icon-button" onclick="showContent('rfc')">📄 Course</button>
  <button class="icon-button" onclick="showContent('rfp')">📝 Exercises</button>
</div>

<div id="rfc" class="content" style="display:none;">
  <h3>Rational Functions Course</h3>
  <iframe src="rf/rfc.pdf"></iframe>
</div>

<div id="rfp" class="content" style="display:none;">
  <h3>Rational Functions Exercises</h3>
  <iframe src="rf/rfp.pdf"></iframe>
</div>

<script>
function showContent(id) {
  const sections = ['statc','statp','rfc','rfp'];
  sections.forEach(sec => {
    const el = document.getElementById(sec);
    if (el) el.style.display = 'none';
  });
  const target = document.getElementById(id);
  if (target) target.style.display = 'block';
}
</script>

</body>
</html>
