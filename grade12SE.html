<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grade 12 Math</title>
  <style>
    body { text-align: left; font-family: Arial, sans-serif; }
    .icon-button {
      background-color: #2196F3;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin: 5px;
      border-radius: 5px;
      font-size: 14px;
    }
    .icon-button:hover { background-color: #0b7dda; }
    .content {
      padding: 10px;
      background-color: #f9f9f9;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      text-align: left;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .download-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }
    .download-btn:hover { background-color: #3e8e41; }
  </style>
</head>
<body>

<!-- ================= Chap1: Statistics in Two Variables ================= -->

<div class="chapter-card" style="text-align:center;">
  <h2>📘 Chap1: Statistics in Two Variables</h2>
  <div class="tab">
    <button class="icon-button" onclick="showContent('course1')">📄 Course</button>
    <button class="icon-button" onclick="showContent('practice1')">📝 Practice</button>
  </div>
</div>

<div id="course1" class="content" style="display:none;">
  <h2>Course PDF</h2>
  <iframe src="chap1.statisticsintwovariables/Statisticsintwovariablescourse.pdf"></iframe>
  <a href="chap1.statisticsintwovariables/Statisticsintwovariablescourse.pdf" download class="download-btn">⬇ Download Course</a>
</div>

<div id="practice1" class="content" style="display:none;">
  <h2>Practice PDF</h2>
  <iframe src="chap1.statisticsintwovariables/Statisticsintwovariablespractice.pdf"></iframe>
  <a href="chap1.statisticsintwovariables/Statisticsintwovariablespractice.pdf" download class="download-btn">⬇ Download Practice</a>
</div>

<!-- ================= Chap2: Rational Functions ================= -->

<div class="chapter-card" style="text-align:center; margin-top:40px;">
  <h2>📘 Chap2: Rational Functions</h2>
  <div class="tab">
    <button class="icon-button" onclick="showContent('course2')">📄 Course</button>
    <button class="icon-button" onclick="showContent('practice2')">📝 Practice</button>
  </div>
</div>

<div id="course2" class="content" style="display:none;">
  <h2>Course PDF</h2>
  <iframe src="chap2.Rationalfunctions/Rationalfunctionscourse.pdf"></iframe>
  <a href="chap2.Rationalfunctions/Rationalfunctionscourse.pdf" download class="download-btn">⬇ Download Course</a>
</div>

<div id="practice2" class="content" style="display:none;">
  <h2>Practice PDF</h2>
  <iframe src="chap2.Rationalfunctions/Rationalfunctionspractice.pdf"></iframe>
  <a href="chap2.Rationalfunctions/Rationalfunctionspractice.pdf" download class="download-btn">⬇ Download Practice</a>
</div>

<!-- ================= Script ================= -->

<script>
function showContent(id) {
  const sections = [
    'course1','practice1',   // Chap1
    'course2','practice2'    // Chap2
  ];
  sections.forEach(sec => {
    const el = document.getElementById(sec);
    if (el) el.style.display = 'none';
  });
  const target = document.getElementById(id);
  if (target) target.style.display = 'block';
}
</script>

</body>
</html>
