<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grade 12 Math - Continuous Function</title>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
  <style>
    body { text-align: left; font-family: Arial, sans-serif; }
    .icon-button {
      background-color: #2196F3;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      margin: 5px;
      border-radius: 5px;
      font-size: 14px;
    }
    .icon-button:hover { background-color: #0b7dda; }
    .content {
      padding: 10px;
      background-color: #f9f9f9;
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      text-align: left;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .download-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }
    .download-btn:hover { background-color: #3e8e41; }
  </style>
</head>
<body>

<div class="chapter-card" style="text-align:center;">
  <h2>📘 Chapter 1: Continuous Function over an Interval</h2>
  <div class="tab">
    <button class="icon-button" onclick="showContent('course')">📄 Course</button>
    <button class="icon-button" onclick="showContent('exercises')">📝 Exercises</button>
  </div>
</div>

<!-- Course Section -->
<div id="course" class="content" style="display:none;">
  <h2>Course PDF</h2>
  <iframe src="Revision +Continuous Function over an interval.pdf"></iframe>
  <a href="Revision +Continuous Function over an interval.pdf" download class="download-btn">⬇ Download Course</a>
</div>

<!-- Exercises Section -->
<div id="exercises" class="content" style="display:none;">
  <h2>Exercises PDF</h2>
  <iframe src="Worksheet Continuous Function over an interval.pdf"></iframe>
  <a href="Worksheet Continuous Function over an interval.pdf" download class="download-btn">⬇ Download Exercises</a>
</div>

<script>
function showContent(id) {
  const sections = ['course','exercises'];
  sections.forEach(sec => {
    document.getElementById(sec).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
}
</script>

</body>
</html>
